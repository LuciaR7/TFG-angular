
<!-- $any evita el error de tipado porque el rol llega como 'ADMIN', aunque el enum Rol usa otro valor visible. -->
<h2 mat-dialog-title>
  {{ $any(data.rol) === 'ADMIN' ? 'Detalle del Administrador' : 'Detalle del Cliente' }} #{{ data.id }}
</h2>

<mat-dialog-content>
  <p><strong>Nombre:</strong> {{data.name}}</p>
  <p><strong>Apellidos:</strong> {{data.surname}}</p>
  <p><strong>E-Mail:</strong> {{data.email}}</p>
  <p><strong>Teléfono:</strong> {{data.tlf}}</p>
</mat-dialog-content>

<mat-dialog-actions>
  <button mat-button mat-dialog-close color="warn">Cerrar</button>
</mat-dialog-actions>
